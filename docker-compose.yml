services:
  db:
    image: postgres:16-alpine
    container_name: sistema_recompensas_db
    environment:
      POSTGRES_DB: sistema_recompensas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sistema_recompensas"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ../sistema_de_recompensas_backend
    container_name: sistema_recompensas_backend
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: sistema_recompensas
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ../frontend
    container_name: sistema_recompensas_frontend
    environment:
      FRONTEND_PORT: 5173
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

  tests:
    build:
      context: ../Sistema_recompensas_pruebas_automatizadas
    container_name: sistema_recompensas_tests
    environment:
      API_BASE_URL: http://backend:3000
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - tests

volumes:
  postgres_data:
